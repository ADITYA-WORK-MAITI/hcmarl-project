# HC-MARL Scaling Config: N=3 workers, M=3 tasks
environment:
  n_workers: 3
  max_steps: 480
  dt: 1.0
  kappa: 1.0
  muscle_groups:
    shoulder: {F: 0.0146, R: 0.00058, r: 15}
    ankle:    {F: 0.00589, R: 0.0182, r: 15}
    knee:     {F: 0.0150, R: 0.00175, r: 15}
    elbow:    {F: 0.00912, R: 0.00094, r: 15}
    trunk:    {F: 0.00657, R: 0.00354, r: 15}
    grip:     {F: 0.00794, R: 0.00109, r: 15}  # Looft et al. (2018), corrected
  theta_max:
    shoulder: 0.70
    ankle: 0.80
    knee: 0.60
    elbow: 0.45
    trunk: 0.65
    grip: 0.35   # raised: theta_min_max=32.7% with r=15

training:
  total_steps: 5000000
  eval_interval: 50000
  checkpoint_interval: 500000
  seeds: [0, 1, 2, 3, 4]

algorithm:
  lr_actor: 0.0003
  lr_critic: 0.001
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coeff: 0.01
  max_grad_norm: 0.5
  n_epochs: 10
  batch_size: 256
  hidden_dim: 64
  critic_hidden_dim: 128

ecbf:
  alpha1: 0.5
  alpha2: 0.5
  alpha3: 0.5

scaling:
  n_workers: 3
  n_tasks: 3

logging:
  use_wandb: true
  project_name: "hcmarl-neurips2026"
