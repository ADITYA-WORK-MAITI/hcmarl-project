# HC-MARL Full Training Configuration
# NeurIPS 2026 Submission — 5M steps, N=6 workers, 5 seeds
# Estimated: ~3-4 hours per seed on T4 GPU

environment:
  n_workers: 6
  max_steps: 480        # 8-hour shift at 1-min resolution
  dt: 1.0               # 1 minute per step
  kappa: 1.0             # disagreement utility scaling

  muscle_groups:
    shoulder: {F: 0.0146, R: 0.00058, r: 15}
    ankle:    {F: 0.00589, R: 0.0182, r: 15}
    knee:     {F: 0.0150, R: 0.00175, r: 15}
    elbow:    {F: 0.00912, R: 0.00094, r: 15}
    trunk:    {F: 0.00657, R: 0.00354, r: 15}
    grip:     {F: 0.00794, R: 0.00109, r: 30}  # Looft et al. (2018) Table 2: r=30 for hand grip

  theta_max:
    shoulder: 0.70   # > theta_min_max 62.7% (Eq 26)
    ankle: 0.80      # > theta_min_max 2.1%
    knee: 0.60       # > theta_min_max 36.4%
    elbow: 0.45      # > theta_min_max 39.3%
    trunk: 0.65      # > theta_min_max 11.0%
    grip: 0.35       # > theta_min_max 32.7% (raised from 0.25 after r correction)

  # Task demand profiles: fraction of MVC per muscle group
  # Sources: Granata & Marras 1995 (trunk lifting), de Looze et al. 2000 (shoulder pushing),
  #   Hoozemans et al. 2004 (shoulder/grip cart pushing), Snook & Ciriello 1991 (carry/lift),
  #   Nordander et al. 2000 (light repetitive work), Anton et al. 2001 (overhead reach),
  #   McGill et al. 2013 (trunk stabilisation)
  tasks:
    heavy_lift:     {shoulder: 0.45, ankle: 0.10, knee: 0.40, elbow: 0.30, trunk: 0.50, grip: 0.55}  # Granata 1995, Hoozemans 2004
    light_sort:     {shoulder: 0.10, ankle: 0.05, knee: 0.05, elbow: 0.15, trunk: 0.10, grip: 0.20}  # Nordander et al. 2000
    carry:          {shoulder: 0.25, ankle: 0.20, knee: 0.25, elbow: 0.20, trunk: 0.30, grip: 0.45}  # Snook & Ciriello 1991
    overhead_reach: {shoulder: 0.55, ankle: 0.05, knee: 0.10, elbow: 0.35, trunk: 0.15, grip: 0.30}  # Anton et al. 2001
    push_cart:      {shoulder: 0.20, ankle: 0.15, knee: 0.20, elbow: 0.15, trunk: 0.25, grip: 0.40}  # Hoozemans 2004, de Looze 2000
    rest:           {shoulder: 0.00, ankle: 0.00, knee: 0.00, elbow: 0.00, trunk: 0.00, grip: 0.00}

training:
  total_steps: 5000000
  eval_interval: 50000
  checkpoint_interval: 500000
  n_eval_episodes: 10
  seeds: [0, 1, 2, 3, 4]

algorithm:
  lr_actor: 0.0003
  lr_critic: 0.001
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coeff: 0.01
  max_grad_norm: 0.5
  n_epochs: 10
  batch_size: 256
  hidden_dim: 64
  critic_hidden_dim: 128

ecbf:
  alpha1: 0.5
  alpha2: 0.5
  alpha3: 0.5
  kp: 1.0

logging:
  use_wandb: true
  project_name: "hcmarl-neurips2026"
  log_interval: 10
  save_interval: 50
