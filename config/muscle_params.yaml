# ==========================================================================
# HC-MARL Calibrated Muscle Parameters
# ==========================================================================
#
# Source: HC-MARL Framework v12, Table 1.
# F, R from Frey-Law, Looft & Heitsman (2012), Monte Carlo calibration
# against Frey-Law & Avin (2010) meta-analysis (194 publications),
# building on Rohmert (1960) endurance curves.
# r from Looft, Herkert & Frey-Law (2018); shoulder validated by
# Looft & Frey-Law (2020).
#
# Units:
#   F  -- fatigue rate constant [min^{-1}]
#   R  -- base recovery rate constant [min^{-1}]
#   r  -- reperfusion multiplier (dimensionless, r > 1)
#
# Derived quantities (computed in code, listed here for reference):
#   delta_max = R / (F + R)              -- max sustainable duty cycle  (Eq 6)
#   C_max     = F * R / (F + R)          -- max sustainable drive       (Eq 6)
#   theta_min = F / (F + R * r)          -- rest-phase safety threshold (Eq 25)
#   Rr        = R * r                    -- reperfusion recovery rate
#   Rr/F      -- ratio determining rest-phase overshoot potential
# ==========================================================================

muscles:
  shoulder:
    F: 0.0146
    R: 0.00058
    r: 15
    # delta_max: 3.8%   | theta_min_max: 62.7%  | Rr/F: 0.596 (overshoot)
    # Note: Highest safety threshold. Rr/F < 1 means fatigue CAN increase
    # transiently during rest (Section 5.4.1).

  ankle:
    F: 0.00589
    R: 0.0182
    r: 15
    # delta_max: 75.5%  | theta_min_max: 2.1%   | Rr/F: 46.35 (no overshoot)

  knee:
    F: 0.0150
    R: 0.00175
    r: 15
    # delta_max: 10.4%  | theta_min_max: 36.4%  | Rr/F: 1.75 (marginal)

  elbow:
    F: 0.00912
    R: 0.00094
    r: 15
    # delta_max: 9.3%   | theta_min_max: 39.3%  | Rr/F: 1.546 (marginal)

  trunk:
    F: 0.00657
    R: 0.00354
    r: 15
    # delta_max: 35.0%  | theta_min_max: 11.0%  | Rr/F: 8.082 (no overshoot)

  grip:
    F: 0.00794
    R: 0.00109
    r: 15
    # delta_max: 12.1%  | theta_min_max: 32.7%  | Rr/F: 2.059 (marginal)
    # Corrected: Looft et al. (2018) r=15 for grip extensors; r≈3 only for forearm flexors.
    # Previous r=30 was an overestimate based on forearm flexor data.
