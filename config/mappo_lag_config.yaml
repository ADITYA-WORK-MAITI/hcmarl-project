# HC-MARL mappo_lag_config configuration
training:
  total_steps: 2000000
  eval_interval: 50000
  checkpoint_interval: 100000
  n_eval_episodes: 10
  seeds: [0, 1, 2, 3, 4]

algorithm:
  lr_actor: 0.0003
  lr_critic: 0.001
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coeff: 0.05
  # C1 (Batch C): linear anneal to MAPPO standard 0.01 over total_steps.
  entropy_coeff_final: 0.01
  max_grad_norm: 0.5
  n_epochs: 10
  batch_size: 256
  hidden_dim: 64
  critic_hidden_dim: 128
  # Dense cost semantics (S3): step cost = mean_a (sum_m max(0, MF_m - theta_m))
  #   — mean excess fatigue above per-muscle threshold, averaged over workers.
  # Target: mean per-step dense cost <= cost_limit over an episode.
  # Old binary semantics (fraction of muscle-step slots violated) is NOT used
  # here; do not compare this value to prior binary-cost Lagrangian tunings.
  cost_limit: 0.1
  lambda_lr: 0.005
  lambda_init: 0.5

# Baseline: ECBF safety filter MUST be disabled.
# train.py defaults ecbf_mode="on" unless this key is explicitly false.
ecbf:
  enabled: false
