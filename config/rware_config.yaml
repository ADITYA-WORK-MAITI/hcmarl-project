# HC-MARL RWARE Benchmark Configuration
# Reference: Papoudakis et al. (NeurIPS 2021 Datasets Track)
# GitHub: https://github.com/semitable/robotic-warehouse

environment:
  type: rware
  env_id: "rware-tiny-4ag-v2"
  max_steps: 500
  n_agents: 4

training:
  total_steps: 2000000
  eval_interval: 25000
  checkpoint_interval: 250000
  n_eval_episodes: 20
  seeds: [0, 1, 2, 3, 4]

algorithm:
  lr_actor: 0.0005
  lr_critic: 0.001
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coeff: 0.01
  max_grad_norm: 0.5
  n_epochs: 15
  batch_size: 512
  hidden_dim: 128
  critic_hidden_dim: 256

# Methods to benchmark on RWARE
methods:
  - name: MAPPO
    algo: mappo
  - name: IPPO
    algo: ippo
  - name: QMIX
    algo: qmix
  - name: HC-MARL-MAPPO
    algo: mappo
    ecbf: true    # apply ECBF filter (adapted for RWARE constraints)

logging:
  use_wandb: true
  project_name: "hcmarl-rware-benchmark"
  log_interval: 10
