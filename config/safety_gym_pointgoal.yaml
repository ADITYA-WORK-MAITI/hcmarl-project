# Safety-Gymnasium: SafetyPointGoal1-v0
environment:
  env_id: "SafetyPointGoal1-v0"
  max_steps: 1000
  cost_limit: 25.0

training:
  total_steps: 1000000
  eval_interval: 10000
  checkpoint_interval: 100000
  seeds: [0, 1, 2, 3, 4]

algorithm:
  lr_actor: 0.0003
  lr_critic: 0.001
  gamma: 0.99
  gae_lambda: 0.97
  clip_eps: 0.2
  entropy_coeff: 0.01
  cost_limit: 25.0
  lambda_lr: 0.035
  lambda_init: 0.5

logging:
  use_wandb: true
  project_name: "hcmarl-neurips2026"
